server:
  port: 8080

spring:
  application:
    name: suiqu-cloud

  # 1. 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/suiqu_cloud?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456 # 替换为你的数据库密码

  # 2. Redis配置 (用于Token存储和Redisson延时队列)
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  # 3. Elasticsearch配置
  elasticsearch:
    uris: http://localhost:9200
    # 如果有密码，请取消下面注释
    # username: elastic
    # password: your_password

  # 4. RabbitMQ配置 (Canal数据同步)
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123456
    virtual-host: /

  # 5. 文件上传限制配置
  servlet:
    multipart:
      max-file-size: 500MB # 单个文件大小限制
      max-request-size: 500MB # 总请求大小限制

# 6. MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  type-aliases-package: com.suiqu.cloud.entity
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名转换
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印SQL日志，方便调试

# 7. MinIO 存储自定义配置 (代码中通过 @Value 引用)
minio:
  endpoint: http://localhost:9000
  accessKey: admin # 默认是 minioadmin
  secretKey: 12345678 # 默认是 minioadmin
  bucketName: suiqu-files
  tempBucketName: temp-chunks

# 8. JWT 自定义配置
jwt:
  secret: suiqu_cloud_secret_key_fixed_length_32_chars_plus # 签名密钥
  expire: 86400 # 过期时间 (秒)，此处为24小时
  header: Authorization # Request Header 中的 Key

# 9. 日志级别配置
logging:
  level:
    com.suiqu.cloud.mapper: debug
    org.springframework.security: info